name: peblo_ai_story_buddy
description: "Peblo AI Story Buddy — A kid-friendly AI story narration and quiz app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # TTS
  flutter_tts: ^4.2.0

  # Animations
  confetti: ^0.7.0
  flutter_animate: ^4.5.0

  # Haptic Feedback
  vibration: ^2.0.0

  # Typography
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
